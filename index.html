<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Durga Prasad — Portfolio</title>
    <link rel="icon" href="assets/dp.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap"
        rel="stylesheet">

    <!-- Icons -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">

    <!-- CSS Files -->
    <link rel="stylesheet" href="All_Css/Base.css">
    <link rel="stylesheet" href="All_Css/Home.css">
</head>

<body class="alternate">


    <!-- ═══════════ NAVBAR ═══════════ -->
    <section class="navbar">
        <div class="logo">
            <p><span data-text="Durga Prasad"><i class="fas fa-code code"></i> Durga Prasad</span>.dev</p>
        </div>
        <div class="nav-bar">
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#skills">Skills</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
            <button class="resume">My Resume <i class="fas fa-download"></i></button>
        </div>
        <button class="hamburger">&#9776;</button>
    </section>

    <!-- ═══════════ SIDEBAR ═══════════ -->
    <section class="side-bar">
        <button class="cross">&times;</button>
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#skills">Skills</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
        <button class="resume">My Resume <i class="fas fa-download"></i></button>
    </section>

    <!-- ═══════════ HERO ═══════════ -->
    <section class="hero" id="home">
        <div class="hero-inner">
            <div class="hero-left">
                <div class="hero-subtitle reveal">
                    <span class="dot"></span> Hello, I'm
                </div>
                <h1 class="hero-title reveal">Durga Prasad</h1>
                <div class="hero-role reveal">
                    <span class="role-line typed-role"></span>
                </div>
                <p class="hero-desc reveal">
                    I build scalable web applications and machine learning solutions that solve real-world problems and
                    create impact.
                </p>
                <div class="hero-btns reveal">
                    <button class="btn-primary" onclick="location.href='#projects'">
                        View My Work <i class="fas fa-arrow-right"></i>
                    </button>
                    <button class="btn-ghost" onclick="location.href='#contact'">
                        Contact Me <i class="far fa-envelope"></i>
                    </button>
                </div>
                <div class="hero-social-section reveal">
                    <span class="social-label">Connect with me</span>
                    <div class="hero-socials">
                        <a href="https://github.com/Durgaprasad-kota" title="GitHub" target="_blank">
                            <i class="fab fa-github"></i>
                        </a>
                        <a href="https://www.linkedin.com/in/durga-prasad-kota-9a5b65320" title="LinkedIn"
                            target="_blank">
                            <i class="fab fa-linkedin"></i>
                        </a>
                        <a href="https://instagram.com/alone_gamer_rolex" title="Instagram" target="_blank">
                            <i class="fab fa-instagram"></i>
                        </a>
                        <a href="mailto:durgaprasad04289@gmail.com" title="Mail" target="_blank">
                            <i class="far fa-envelope"></i>
                        </a>
                    </div>
                </div>
            </div>
            <div class="hero-image-section reveal from-right">
                <div class="hero-visual">

                    <!-- Purple Circle -->
                    <div class="glow-circle"></div>

                    <!-- Dashed Ring -->
                    <div class="orbit-ring"></div>

                    <!-- Profile Image -->
                    <div class="profile-wrapper me">
                        <img src="assets/me.jpeg" alt="Profile">
                    </div>

                    <!-- Floating Skill Cards -->

                    <div class="skill-card react">
                        <div class="skill-inner">
                            <i class="devicon-react-original colored"></i>
                        </div>
                    </div>

                    <div class="skill-card fastapi">
                        <div class="skill-inner">
                            <i class="devicon-fastapi-plain colored"></i>
                        </div>
                    </div>

                    <div class="skill-card javascript">
                        <div class="skill-inner">
                            <i class="devicon-javascript-plain colored"></i>
                        </div>
                    </div>

                    <div class="skill-card html">
                        <div class="skill-inner">
                            <i class="devicon-html5-plain colored"></i>
                        </div>
                    </div>

                    <div class="skill-card css">
                        <div class="skill-inner">
                            <i class="devicon-css3-plain colored"></i>
                        </div>
                    </div>

                    <div class="skill-card django">
                        <div class="skill-inner">
                            <i class="devicon-django-plain "></i>
                        </div>
                    </div>

                    <div class="skill-card python">
                        <div class="skill-inner">
                            <i class="fab fa-python colored"></i>
                        </div>
                    </div>

                    <div class="skill-card postgres">
                        <div class="skill-inner">
                            <i class="devicon-postgresql-plain colored"></i>
                        </div>
                    </div>

                    <div class="skill-card docker">
                        <div class="skill-inner">
                            <i class="devicon-docker-plain colored"></i>
                        </div>
                    </div>

                    <div class="skill-card typescript">
                        <div class="skill-inner">
                            <i class="devicon-typescript-plain colored"></i>
                        </div>
                    </div>

                    <div class="skill-card Ml">
                        <div class="skill-inner">
                            <i class="fas fa-brain"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="scroll-hint">
            <div class="scroll-mouse"></div>
            <span>Scroll</span>
        </div>
        <!-- Typed.js -->
        <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
        <script>
            new Typed(".typed-role", {
                strings: ["Python Full Stack Developer", "Machine Learning Engineer", "AI Solutions Builder"],
                typeSpeed: 75, backSpeed: 45, backDelay: 1600, loop: true
            });
        </script>
    </section>
    </section>


</body>

</html>

<script src="script.js"></script>
